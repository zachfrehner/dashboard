spring:
  application:
    name: burnmetrix-dashboard
  datasource:
    url: jdbc:sqlite:../database/data/burnmetrix.db
    driver-class-name: org.sqlite.JDBC
  flyway:
    enabled: true
    locations: classpath:db/migration
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.community.dialect.SQLiteDialect

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info

burnmetrix:
  security:
    authentication-enabled: false
