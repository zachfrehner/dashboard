spring:
  application:
    name: burnmetrix-dashboard
  datasource:
    url: jdbc:sqlite:../database/data/burnmetrix.db
    driver-class-name: org.sqlite.JDBC
  flyway:
    enabled: true
    locations: classpath:db/migration
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.community.dialect.SQLiteDialect

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info

burnmetrix:
  security:
    authentication-enabled: false
  metabolic:
    strava-client-id: ${STRAVA_CLIENT_ID:}
    strava-client-secret: ${STRAVA_CLIENT_SECRET:}
    strava-redirect-uri: ${STRAVA_REDIRECT_URI:http://localhost:8080/api/metabolic/auth/callback}
    token-file: ${BURNMETRIX_TOKEN_FILE:../database/data/strava-tokens.json}
    glycogen-start-grams: ${GLYCOGEN_START_GRAMS:500}
    planned-carb-intake-g-per-hour: ${PLANNED_CARB_INTAKE_G_PER_HOUR:60}
